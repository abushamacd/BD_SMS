# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "62c54ec50262bc8bb4b6105244669adc"
name = "BD SMS"
application_url = "https://example.com"
embedded = true

[access_scopes]
# read_orders      — order automations, and abandoned checkouts (there is no Admin
#                    read_checkouts scope; checkouts/* webhooks run on read_orders)
# write_orders     — tag COD orders as confirmed/unconfirmed after OTP
# read_fulfillments — shipment + delivery status for fulfillment SMS
# read_customers   — campaign audience, phone numbers, SMS marketing consent
#
# read_orders and read_customers are protected customer data and require
# approval in the Partner Dashboard before phone numbers resolve in production.
scopes = "read_orders,write_orders,read_fulfillments,read_customers"

[webhooks]
api_version = "2026-10"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = [ "app/scopes_update" ]

  # Order automations. All of these carry protected customer data (phone
  # numbers), so they only deliver in production once the app is approved.
  [[webhooks.subscriptions]]
  uri = "/webhooks/orders/create"
  topics = [ "orders/create" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/orders/fulfilled"
  topics = [ "orders/fulfilled" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/orders/cancelled"
  topics = [ "orders/cancelled" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/fulfillments/create"
  topics = [ "fulfillments/create" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/fulfillments/update"
  topics = [ "fulfillments/update" ]

[auth]
redirect_urls = [ "https://example.com/api/auth" ]

[build]
include_config_on_deploy = true
automatically_update_urls_on_dev = true
