# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "a790eb37d80988db57454ec0af0b4efe"
name = "BD SMS"
application_url = "https://example.com"
embedded = true

[access_scopes]
# read_orders      — order automations, and abandoned checkouts (there is no Admin
#                    read_checkouts scope; checkouts/* webhooks run on read_orders)
# write_orders     — tag COD orders as confirmed/unconfirmed after OTP
# read_fulfillments — shipment + delivery status for fulfillment SMS
# read_customers   — campaign audience, phone numbers, SMS marketing consent
#
# read_orders and read_customers are protected customer data and require
# approval in the Partner Dashboard before phone numbers resolve in production.
scopes = "read_orders,write_orders,read_fulfillments,read_customers"

[webhooks]
api_version = "2026-10"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = [ "app/scopes_update" ]

  # Order automations. All of these carry protected customer data (phone
  # numbers), so they only deliver in production once the app is approved.
  [[webhooks.subscriptions]]
  uri = "/webhooks/orders/create"
  topics = [ "orders/create" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/orders/fulfilled"
  topics = [ "orders/fulfilled" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/orders/cancelled"
  topics = [ "orders/cancelled" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/fulfillments/create"
  topics = [ "fulfillments/create" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/fulfillments/update"
  topics = [ "fulfillments/update" ]

  # Abandoned checkout recovery. checkouts/update fires repeatedly while the
  # customer is still filling in the form, which is how we know they are still
  # active and the reminder should wait.
  [[webhooks.subscriptions]]
  uri = "/webhooks/checkouts/create"
  topics = [ "checkouts/create" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/checkouts/update"
  topics = [ "checkouts/update" ]

  # Billing. Without these, the app only learns a charge was approved when the
  # merchant happens to open the Billing page — and would go on believing a
  # cancelled or lapsed subscription is still active.
  [[webhooks.subscriptions]]
  uri = "/webhooks/app/subscriptions_update"
  topics = [ "app_subscriptions/update" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/purchases_one_time_update"
  topics = [ "app_purchases_one_time/update" ]

  # Mandatory GDPR / privacy compliance. Shopify will not approve the app without
  # these three, and they are declared with `compliance_topics` rather than
  # `topics` — a subscription block takes one or the other, never both.
  [[webhooks.subscriptions]]
  uri = "/webhooks/customers/data_request"
  compliance_topics = [ "customers/data_request" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/customers/redact"
  compliance_topics = [ "customers/redact" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/shop/redact"
  compliance_topics = [ "shop/redact" ]

[auth]
redirect_urls = [ "https://example.com/api/auth" ]

[build]
include_config_on_deploy = true
automatically_update_urls_on_dev = true
